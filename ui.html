<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>omi-whisperx monitor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0d1117;
  color: #e6edf3;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 13px;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  padding: 10px 16px;
  border-bottom: 1px solid #21262d;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  background: #161b22;
}

h1 { font-size: 13px; font-weight: 600; color: #58a6ff; letter-spacing: 0.5px; }

#dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #f85149;
  flex-shrink: 0;
  transition: background 0.3s;
}
#dot.on { background: #3fb950; }

#stats {
  color: #8b949e;
  font-size: 11px;
  margin-left: auto;
  display: flex;
  gap: 16px;
}
.stat { display: flex; gap: 4px; }
.stat-label { color: #6e7681; }
.stat-val { font-weight: 600; }
.stat-val.kept  { color: #3fb950; }
.stat-val.drop  { color: #f85149; }
.stat-val.total { color: #58a6ff; }

#feed {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* newest chunk at top */
#feed { display: flex; flex-direction: column; }

.chunk {
  border: 1px solid #21262d;
  border-radius: 6px;
  overflow: hidden;
  animation: fadein 0.2s ease;
}
@keyframes fadein { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }

.chunk-header {
  background: #161b22;
  padding: 6px 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  font-size: 11px;
  color: #8b949e;
  border-bottom: 1px solid #21262d;
}
.chunk-id   { color: #6e7681; font-size: 10px; }
.chunk-time { color: #8b949e; }
.chunk-lang { color: #58a6ff; font-weight: 600; }
.chunk-size { color: #6e7681; }

.row {
  padding: 5px 12px;
  display: flex;
  gap: 10px;
  align-items: baseline;
  border-top: 1px solid #161b22;
  line-height: 1.5;
}
.row:first-of-type { border-top: none; }

.stage {
  width: 52px;
  flex-shrink: 0;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #6e7681;
  padding-top: 1px;
}

.content { flex: 1; min-width: 0; }

/* Whisper row */
.whisper-lang { color: #a5d6ff; }
.seg-count    { color: #6e7681; font-size: 11px; }

/* NLI row */
.nli-keep      { color: #3fb950; }
.nli-ent       { color: #f85149; }
.nli-uncertain { color: #d29922; }
.conf { color: #6e7681; font-size: 11px; margin-left: 4px; }
.escalated { color: #d29922; font-size: 11px; margin-left: 6px; }

/* Ollama row */
.ollama-keep { color: #3fb950; }
.ollama-ent  { color: #f85149; }

/* Detail sub-rows (input text + scores) */
.detail {
  margin-top: 4px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.detail-input {
  color: #6e7681;
  font-size: 11px;
  font-style: italic;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.detail-input::before { content: "↳ "; color: #444c56; }
.detail-scores {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  font-size: 11px;
}
.score-item { color: #6e7681; }
.score-item .score-label { color: #8b949e; }
.score-item.score-top .score-label { color: #e6edf3; }
.score-item.score-top .score-pct   { font-weight: 600; }
.detail-raw {
  font-size: 11px;
  color: #6e7681;
}
.detail-raw::before { content: "↳ raw: "; color: #444c56; }

/* Transcript rows */
.speaker { color: #bc8cff; font-weight: 600; margin-right: 4px; }
.text    { color: #e6edf3; }
.timing  { color: #6e7681; font-size: 11px; margin-left: 6px; }

/* Result row */
.result-saved   { color: #3fb950; font-weight: 600; letter-spacing: 0.3px; }
.result-dropped { color: #f85149; font-weight: 600; letter-spacing: 0.3px; }
.preview { color: #6e7681; font-size: 11px; margin-left: 6px; font-style: italic; }
</style>
</head>
<body>

<header>
  <div id="dot"></div>
  <h1>omi-whisperx monitor</h1>
  <a href="/ui/speakers" style="margin-left:auto;color:#8b949e;font-size:11px;text-decoration:none;padding:2px 8px;border-radius:4px;border:1px solid #21262d;">speakers</a>
  <a href="/benchmark" style="color:#8b949e;font-size:11px;text-decoration:none;padding:2px 8px;border-radius:4px;border:1px solid #21262d;">benchmark</a>
  <div id="stats">
    <div class="stat"><span class="stat-label">chunks</span><span class="stat-val total" id="s-total">0</span></div>
    <div class="stat"><span class="stat-label">kept</span><span class="stat-val kept" id="s-kept">0</span></div>
    <div class="stat"><span class="stat-label">dropped</span><span class="stat-val drop" id="s-drop">0</span></div>
  </div>
</header>

<div id="feed"></div>

<script>
const feed    = document.getElementById('feed');
const dot     = document.getElementById('dot');
const sTotal  = document.getElementById('s-total');
const sKept   = document.getElementById('s-kept');
const sDrop   = document.getElementById('s-drop');

let total = 0, kept = 0, dropped = 0;

function updateStats() {
  sTotal.textContent = total;
  sKept.textContent  = kept;
  sDrop.textContent  = dropped;
}

function ts() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function getChunk(id) {
  return document.getElementById('c-' + id);
}

function addRow(chunkId, stageLabel, contentHtml) {
  const chunk = getChunk(chunkId);
  if (!chunk) return;
  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = `<div class="stage">${stageLabel}</div><div class="content">${contentHtml}</div>`;
  chunk.appendChild(row);
}

// ── Event handlers ──────────────────────────────────────────────

function onAudioReceived(ev) {
  total++;
  updateStats();

  const el = document.createElement('div');
  el.className = 'chunk';
  el.id = 'c-' + ev.chunk_id;
  el.innerHTML = `
    <div class="chunk-header">
      <span class="chunk-time">${ts()}</span>
      <span class="chunk-id">#${ev.chunk_id}</span>
      <span class="chunk-size">${ev.size_kb} KB</span>
    </div>`;
  feed.insertBefore(el, feed.firstChild);
}

function onTranscribed(ev) {
  addRow(ev.chunk_id, 'whisper',
    `<span class="whisper-lang">${ev.lang}</span> &nbsp;`+
    `<span class="seg-count">${ev.segments} segment${ev.segments !== 1 ? 's' : ''}</span>`
  );
}

function onNliResult(ev) {
  const pct = Math.round(ev.confidence * 100);
  const cls = ev.confident
    ? (ev.decision === 'entertainment' ? 'nli-ent' : 'nli-keep')
    : 'nli-uncertain';
  const esc = !ev.confident ? '<span class="escalated">→ Ollama</span>' : '';

  // Score pills — short label (first 28 chars)
  const scorePills = (ev.scores || []).map((s, i) => {
    const short = s.label.length > 28 ? s.label.slice(0, 28) + '…' : s.label;
    const pct2  = Math.round(s.score * 100);
    return `<span class="score-item${i === 0 ? ' score-top' : ''}">` +
           `<span class="score-label">${short}</span>` +
           `<span class="score-pct"> ${pct2}%</span></span>`;
  }).join('');

  const inputLine = ev.input_text
    ? `<div class="detail-input">${ev.input_text.slice(0, 120)}</div>`
    : '';

  addRow(ev.chunk_id, 'NLI',
    `<span class="${cls}">${ev.decision}</span>` +
    `<span class="conf">${pct}%</span>${esc}` +
    `<div class="detail">` +
      `<div class="detail-scores">${scorePills}</div>` +
      inputLine +
    `</div>`
  );
}

function onOllamaResult(ev) {
  const cls = ev.decision === 'entertainment' ? 'ollama-ent' : 'ollama-keep';

  const inputLine = ev.input_text
    ? `<div class="detail-input">${ev.input_text.slice(0, 120)}</div>`
    : '';
  const rawLine = ev.raw_response
    ? `<div class="detail-raw">${ev.raw_response}</div>`
    : '';

  addRow(ev.chunk_id, 'ollama',
    `<span class="${cls}">${ev.decision}</span>` +
    `<div class="detail">${rawLine}${inputLine}</div>`
  );
}

function onFiltered(ev) {
  dropped++;
  updateStats();
  const preview = ev.preview ? `<span class="preview">"${ev.preview}"</span>` : '';
  addRow(ev.chunk_id, 'result',
    `<span class="result-dropped">DROPPED</span>${preview}`
  );
}

function onTranscript(ev) {
  kept++;
  updateStats();
  ev.segments.forEach(seg => {
    addRow(ev.chunk_id, 'seg',
      `<span class="speaker">[${seg.speaker}]</span>`+
      `<span class="text">${seg.text}</span>`+
      `<span class="timing">${seg.start.toFixed(1)}–${seg.end.toFixed(1)}s</span>`
    );
  });
  addRow(ev.chunk_id, 'result',
    `<span class="result-saved">SAVED</span> `+
    `<span class="conf">${ev.duration.toFixed(1)}s &nbsp; ${ev.lang}</span>`
  );
}

// ── SSE connection ───────────────────────────────────────────────

const HANDLERS = {
  audio_received: onAudioReceived,
  transcribed:    onTranscribed,
  nli_result:     onNliResult,
  ollama_result:  onOllamaResult,
  filtered:       onFiltered,
  transcript:     onTranscript,
};

function connect() {
  const es = new EventSource('/events');

  es.onopen = () => dot.classList.add('on');

  es.onerror = () => {
    dot.classList.remove('on');
    es.close();
    setTimeout(connect, 3000); // auto-reconnect
  };

  es.onmessage = (e) => {
    try {
      const ev = JSON.parse(e.data);
      const handler = HANDLERS[ev.type];
      if (handler) handler(ev);
    } catch (_) {}
  };
}

connect();
</script>
</body>
</html>
